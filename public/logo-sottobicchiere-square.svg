<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Sottobicchiere">
  <title>Sottobicchiere</title>
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Coaster / base -->
  <rect width="200" height="200" rx="44" fill="url(#sb-bg)"/>
  <!-- Coaster groove ring -->
  <rect x="26" y="26" width="148" height="148" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4"/>
  <!-- Dice-6 dot pattern -->
  <g fill="#ffffff">
    <circle cx="72" cy="64" r="13"/>
    <circle cx="72" cy="100" r="13"/>
    <circle cx="72" cy="136" r="13"/>
    <circle cx="128" cy="64" r="13"/>
    <circle cx="128" cy="136" r="13"/>
  </g>
  <!-- Amber accent dot -->
  <circle cx="128" cy="100" r="13" fill="#F59E0B"/>
</svg>
