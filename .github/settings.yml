# Declarative branch protection for repositories using the Probot Settings app.
# Mirrors the required GitHub UI settings for main: required checks + 1 approval.
branches:
  - name: main
    protection:
      enforce_admins: true
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        required_approving_review_count: 1
      required_status_checks:
        strict: true
        contexts:
          - typecheck
          - lint
          - build
          - actionlint
      restrictions: null
