# Configurazione Supabase locale (supabase start).
# In produzione le stesse impostazioni vanno replicate nella dashboard del progetto.
project_id = "sottobicchiere"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
# Auth anonima: ogni giocatore ottiene un utente effimero con JWT reale,
# necessario per RLS e per i channel realtime privati.
enable_anonymous_sign_ins = true

[auth.rate_limit]
# Accessi anonimi per ORA per IP (anti-abuso). Attenzione (audit B1): in un locale
# tutti i giocatori escono dallo stesso IP pubblico (NAT del WiFi), quindi questo è
# di fatto un tetto PER-LOCALE, non per-utente. Alzato per reggere un locale pieno;
# per venue ad altissimo traffico valutare un CAPTCHA invece di alzarlo ancora.
# In produzione replicare il valore in Dashboard → Auth → Rate Limits.
anonymous_users = 150
